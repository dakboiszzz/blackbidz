name: Sync to Hugging Face
on:
  push:
    branches: [main] # Runs every time you push to main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Create a temporary folder to hold only the backend files
          mkdir hf_sync
          cp -r backend/* hf_sync/
          cd hf_sync
          
          # 2. Setup Git inside the backend folder
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 3. Add the HF Space as a remote
          # Change USERNAME and SPACE_NAME to yours!
          git remote add space https://dakboiszzz:$HF_TOKEN@huggingface.co/spaces/Blackbi/lth-blog
          
          # 4. Force push the contents of 'backend' to the 'main' branch of the Space
          git add .
          git commit -m "Syncing backend from GitHub"
          git push space main:main --force